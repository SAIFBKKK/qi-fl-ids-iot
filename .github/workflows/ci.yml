name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test-v2:
    name: Lint & Test — fl-iot-ids-v2
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: experiments/fl-iot-ids-v2

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: experiments/fl-iot-ids-v2/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff pytest
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install -e .

      - name: Lint with ruff
        run: ruff check src/

      - name: Run smoke tests
        run: pytest tests/ -v --tb=short -m "not slow"

  lint-and-test-v1:
    name: Lint & Test — fl-iot-ids-v1 (legacy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: experiments/fl-iot-ids-v1

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: experiments/fl-iot-ids-v1/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff pytest
          pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check src/

      - name: Run smoke tests
        run: pytest tests/ -v --tb=short -m "not slow"
