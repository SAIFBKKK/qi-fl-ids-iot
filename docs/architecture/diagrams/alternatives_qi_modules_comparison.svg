<!-- ═══ CONCLUSION ═══ -->
<rect x="20" y="622" width="640" height="22" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="340" y="637" text-anchor="middle" fill="#3C3489">Recommandation finale — réponse honnête d'ingénieur</text>

<rect x="20" y="650" width="640" height="82" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="36" y="668" fill="#712B13">Pourquoi QGA reste le choix pour M2 malgré des alternatives ?</text>
<text class="ts" x="36" y="686" fill="#712B13">Ce n'est pas "le meilleur algorithme d'optimisation absolument". C'est le meilleur POUR CE PROBLÈME.</text>
<text class="ts" x="36" y="702" fill="#712B13">Feature selection = espace {0,1}^46 discret → QGA encode natif chaque feature comme qubit.</text>
<text class="ts" x="36" y="718" fill="#712B13">QPSO = continu par nature, nécessite une conversion binaire artificielle → moins élégant théoriquement.</text>

<rect x="20" y="744" width="640" height="22" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.3"/>
<text class="th" x="340" y="759" text-anchor="middle" fill="#444441">Si tu veux changer : substitutions recommandées</text>

<rect x="20" y="772" width="198" height="66" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="119" y="790" text-anchor="middle" fill="#085041">M2 : QGA → QPSO bin.</text>
<text class="ts" x="119" y="808" text-anchor="middle" fill="#085041">Code plus simple</text>
<text class="ts" x="119" y="824" text-anchor="middle" fill="#085041">Perf. similaire</text>

<rect x="241" y="772" width="198" height="66" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="340" y="790" text-anchor="middle" fill="#085041">M1 : QIARM → QPSO agg.</text>
<text class="ts" x="340" y="808" text-anchor="middle" fill="#085041">Même famille QI</text>
<text class="ts" x="340" y="824" text-anchor="middle" fill="#085041">Plus connu en littérature</text>

<rect x="462" y="772" width="198" height="66" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="561" y="790" text-anchor="middle" fill="#633806">M3 : FedTN → PowerSGD</text>
<text class="ts" x="561" y="808" text-anchor="middle" fill="#633806">Moins QI-oriented</text>
<text class="ts" x="561" y="824" text-anchor="middle" fill="#633806">Impl. beaucoup + simple</text>

<rect x="20" y="852" width="640" height="52" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="36" y="870" fill="#633806">Piège à éviter : changer d'algorithme n'a de valeur que si tu peux le justifier scientifiquement.</text>
<text class="ts" x="36" y="888" fill="#633806">"J'ai choisi QGA car son espace de recherche discret correspond naturellement à la sélection binaire</text>
<text class="ts" x="36" y="902" fill="#633806">de features, prouvé par [Barati 2024] sur NSL-KDD (FPR 3.2%)" vaut 10× plus qu'un algorithme.</text>

<rect x="20" y="916" width="640" height="44" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="340" y="934" text-anchor="middle" fill="#3C3489">La vraie valeur ajoutée de ton PFE = la chaîne COMPLÈTE prouvée par ablation.</text>
<text class="ts" x="340" y="950" text-anchor="middle" fill="#3C3489">QGA + QIARM + FedTN vs {FedAvg, FedProx, No-QI} = contribution mesurable et défendable.</text>
