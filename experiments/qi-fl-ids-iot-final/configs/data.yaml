project_root: "."
final_experiment_dir: "experiments/qi-fl-ids-iot-final"

dataset:
  parquet_path: "data/balancing_v3_fixed300k_outputs/balancing_v3_fixed300k_balanced.parquet"
  csv_path: "data/balancing_v3_fixed300k_outputs/balancing_v3_fixed300k_balanced.csv"
  label_mapping_path: "data/balancing_v3_fixed300k_outputs/label_mapping.json"
  source_priority: "parquet"

schema:
  expected_rows: 9401350
  expected_columns: 29
  label_column: "label_id"
  expected_num_features: 28
  expected_num_classes: 34
