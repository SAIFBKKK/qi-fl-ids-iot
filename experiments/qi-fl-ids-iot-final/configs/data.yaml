validation:
  check_missing_values: true
  check_infinite_values: true
  check_numeric_features: true
  check_label_mapping: true
  check_class_distribution: true
  check_binary_distribution: true
  check_family_distribution: true

outputs:
  docs_dir: "experiments/qi-fl-ids-iot-final/docs"
  reports_dir: "experiments/qi-fl-ids-iot-final/outputs/reports"
  figures_dir: "experiments/qi-fl-ids-iot-final/outputs/figures/data_validation"
  artifacts_dir: "experiments/qi-fl-ids-iot-final/outputs/artifacts"
