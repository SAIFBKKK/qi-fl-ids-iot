project_root: "."
final_experiment_dir: "experiments/qi-fl-ids-iot-final"

inputs:
  train_npz: "experiments/qi-fl-ids-iot-final/outputs/preprocessed/l1_binary/train_scaled.npz"
  val_npz: "experiments/qi-fl-ids-iot-final/outputs/preprocessed/l1_binary/val_scaled.npz"
  test_npz: "experiments/qi-fl-ids-iot-final/outputs/preprocessed/l1_binary/test_scaled.npz"
  manifest: "experiments/qi-fl-ids-iot-final/outputs/preprocessed/l1_binary/manifest.json"
  sampling_report: "experiments/qi-fl-ids-iot-final/outputs/preprocessed/l1_binary/sampling_report.json"
  scaler: "experiments/qi-fl-ids-iot-final/outputs/artifacts/scalers/l1_binary_robust_scaler.pkl"
  feature_names: "experiments/qi-fl-ids-iot-final/outputs/artifacts/features/feature_names.json"

historical_baseline:
  enabled: true
  name: "TorchMLP Kaggle 34-class baseline"
  architecture: "28 -> 128 -> 64 -> 34"
  best_val_f1_macro: 0.8110840586599894
  test_f1_macro: 0.8109757023708111
  test_accuracy: 0.8418915574566215
  source_note: "Historical centralized 34-class Kaggle baseline; kept as L3/multiclass reference, not used as P4 L1 baseline."

model:
  name: "CentralizedL1MLP"
  input_dim: 28
  hidden_layers: [128, 64]
  output_dim: 2
  dropout: 0.2
  activation: "relu"

training:
  seed: 42
  device: "auto"
  batch_size: 512
  max_epochs: 30
  early_stopping_patience: 5
  optimizer: "adam"
  learning_rate: 0.001
  weight_decay: 0.0001
  loss: "cross_entropy"
  use_class_weights: false
  scheduler: "reduce_on_plateau"
  best_metric: "val_macro_f1"

threshold:
  tune_on: "validation"
  start: 0.05
  stop: 0.95
  step: 0.05
  primary_objective: "f1_attack"
  secondary_objective: "recall_attack_with_fpr_control"

labels:
  normal:
    id: 0
    name: "normal"
  attack:
    id: 1
    name: "attack"

outputs:
  run_dir: "experiments/qi-fl-ids-iot-final/outputs/centralized_l1"
  reports_dir: "experiments/qi-fl-ids-iot-final/outputs/reports"
  figures_training_dir: "experiments/qi-fl-ids-iot-final/outputs/figures/training"
  figures_evaluation_dir: "experiments/qi-fl-ids-iot-final/outputs/figures/evaluation"
  figures_models_dir: "experiments/qi-fl-ids-iot-final/outputs/figures/models"
