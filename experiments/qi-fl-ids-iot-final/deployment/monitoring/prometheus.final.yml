global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "final-ids-api"
    static_configs:
      - targets: ["final-ids-api:8014"]
    metrics_path: "/metrics"

  - job_name: "traffic-generator"
    static_configs:
      - targets: ["traffic-generator:8000"]
    metrics_path: "/metrics"
