strategy:
  name: fedavg
  num_rounds: 20
  fraction_train: 1.0
  fraction_evaluate: 1.0
  min_train_nodes: 3
  min_evaluate_nodes: 3
  min_available_nodes: 3
  weighted_by_num_examples: true

train:
  local_epochs: 1
  batch_size: 256
  learning_rate: 0.0005
  optimizer: adam
  weight_decay: 0.0001
  lr_scheduler: reduce_on_plateau
  lr_patience: 4
  lr_factor: 0.5

evaluation:
  centralized_eval: false
  federated_eval: true
  best_round_monitor: macro_f1
