strategy:
  name: fedprox
  num_rounds: 3
  fraction_train: 1.0
  fraction_evaluate: 1.0
  min_train_nodes: 3
  min_evaluate_nodes: 3
  min_available_nodes: 3
  weighted_by_num_examples: true

train:
  local_epochs: 1
  batch_size: 512
  learning_rate: 0.0005
  optimizer: adam
  weight_decay: 0.0001
  proximal_mu: 0.01

evaluation:
  centralized_eval: false
  federated_eval: true