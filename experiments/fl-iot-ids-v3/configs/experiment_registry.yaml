experiments:
  - name: exp_v3_fedavg_normal_classweights
    architecture: flat_34
    fl_strategy: fedavg
    fl_config: fedavg
    data_scenario: normal_noniid
    imbalance_strategy: class_weights
    description: "Baseline FedAvg sur partition normal_noniid avec class weights."

  - name: exp_v3_fedavg_normal_focal
    architecture: flat_34_v1style
    fl_strategy: fedavg
    fl_config: fedavg_v1style_focal
    data_scenario: normal_noniid
    imbalance_strategy: focal_loss
    description: "FedAvg v1style avec focal loss simple."

  - name: exp_v3_fedavg_normal_focal_weighted
    architecture: flat_34_v1style
    fl_strategy: fedavg
    fl_config: fedavg_v1style_focal
    data_scenario: normal_noniid
    imbalance_strategy: focal_loss_weighted
    description: "FedAvg v1style avec focal loss + class weights."

  - name: exp_v3_fedprox_absentlocal_classweights
    architecture: flat_34
    fl_strategy: fedprox
    fl_config: fedprox
    data_scenario: absent_local
    imbalance_strategy: class_weights
    description: "FedProx sur scenario absent_local pour reduire le drift."

  - name: exp_v3_fedavg_rareexpert_focal_weighted
    architecture: flat_34_v1style
    fl_strategy: fedavg
    fl_config: fedavg_v1style_focal
    data_scenario: rare_expert
    imbalance_strategy: focal_loss_weighted
    expert_factor: 2.0
    description: "rare_expert avec ponderation de l'expert et focal weighted."
