strategy:
  name: fedprox
  num_rounds: 10
  fraction_train: 1.0
  fraction_evaluate: 1.0
  min_train_nodes: 3
  min_evaluate_nodes: 3
  min_available_nodes: 3
  expert_factor: 1.0
  expert_node_id: node3

train:
  local_epochs: 1
  batch_size: 256
  learning_rate: 0.0005
  optimizer: adam
  weight_decay: 0.0001
  proximal_mu: 0.01

evaluation:
  centralized_eval: false
  federated_eval: true
  best_round_monitor: macro_f1
