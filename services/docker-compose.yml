# QI-FL-IDS-IoT - Microservices stack
# Architecture validated on 5 axes (services, communication, stack, volumes, demo)
# Profiles: default | training | preprocessing | orchestration

x-future-service-mounts:
  artifacts_ro:
    - ../experiments/fl-iot-ids-v3/outputs/deployment/baseline_fedavg_normal_classweights:/artifacts:ro
  data_ro:
    - ../data/balancing_v3_fixed300k_outputs:/data/full:ro
    - ../data/cic-iot-2023/demo_subsets:/data/demo:ro

networks:
  iot-net:
    driver: bridge

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  node_red_data:
    driver: local

services:
  mosquitto:
    image: eclipse-mosquitto:2.0.18
    container_name: mosquitto
    ports:
      - "${MQTT_PORT:-1883}:1883"
    environment:
      MQTT_USERNAME: ${MQTT_USERNAME:-ids_user}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-changeme_in_dotenv}
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/passwords:/mosquitto/config/passwords:ro
    networks:
      - iot-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mosquitto_sub -h localhost -u \"$${MQTT_USERNAME}\" -P \"$${MQTT_PASSWORD}\" -t '$$SYS/broker/version' -C 1 -W 3 >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  iot-node-1:
    build:
      context: ./iot-node
    container_name: iot-node-1
    environment:
      NODE_ID: node1
      MQTT_BROKER: mosquitto
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_USERNAME: ${MQTT_USERNAME:-ids_user}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-changeme_in_dotenv}
      INFERENCE_THRESHOLD: ${INFERENCE_THRESHOLD:-0.5}
      MODEL_PATH: /artifacts/global_model.pth
      SCALER_PATH: /artifacts/scaler.pkl
      LABEL_MAPPING_PATH: /artifacts/label_mapping.json
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    ports:
      - "8001:8000"
    volumes:
      - ../experiments/fl-iot-ids-v3/outputs/deployment/baseline_fedavg_normal_classweights:/artifacts:ro
    networks:
      - iot-net
    depends_on:
      mosquitto:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  traffic-generator:
    build:
      context: ./traffic-generator
    container_name: traffic-generator
    env_file:
      - .env
    environment:
      NODE_ID: ${NODE_ID:-node1}
      MQTT_BROKER: ${MQTT_BROKER:-mosquitto}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_USERNAME: ${MQTT_USERNAME:-ids_user}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-changeme_in_dotenv}
      REPLAY_SCENARIO: ${REPLAY_SCENARIO:-mixed_chaos}
      REPLAY_RATE: ${REPLAY_RATE:-5}
      DATASET_DIR: /data/demo
      ARTIFACTS_DIR: /artifacts
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    ports:
      - "8010:8000"
    volumes:
      - ../data/cic-iot-2023/demo_subsets:/data/demo:ro
      - ../experiments/fl-iot-ids-v3/outputs/deployment/baseline_fedavg_normal_classweights:/artifacts:ro
    networks:
      - iot-net
    depends_on:
      mosquitto:
        condition: service_healthy
      iot-node-1:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - iot-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.3
    container_name: grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme_in_dotenv}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks:
      - iot-net
    depends_on:
      - prometheus
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.18.0
    container_name: mlflow
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    volumes:
      - ../outputs/mlruns:/mlruns
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri /mlruns
    networks:
      - iot-net
    restart: unless-stopped

  fl-server:
    build:
      context: ./fl-server
    container_name: fl-server
    profiles: ["training"]
    env_file:
      - .env
    environment:
      FL_SERVER_HOST: 0.0.0.0
      FL_SERVER_PORT: ${FL_SERVER_PORT:-8080}
      FL_NUM_ROUNDS: ${FL_NUM_ROUNDS:-10}
      REAL_FL_EXPERIMENT: ${REAL_FL_EXPERIMENT:-exp_v4_multitier_fedavg_normal_classweights}
      REAL_FL_ROUNDS: ${REAL_FL_ROUNDS:-1}
      REAL_FL_WORKDIR: /app/experiments/fl-iot-ids-v3
      MLFLOW_TRACKING_URI: http://mlflow:5000
      TRAINING_MODE: ${TRAINING_MODE:-mock}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    ports:
      - "${FL_SERVER_PORT:-8080}:8080"
    volumes:
      - ../experiments/fl-iot-ids-v3/outputs/deployment/baseline_fedavg_normal_classweights:/artifacts:ro
      - ../experiments/fl-iot-ids-v3:/app/experiments/fl-iot-ids-v3
    networks:
      - iot-net
    depends_on:
      - mlflow
    restart: "no"

  fl-client-1:
    build:
      context: ./fl-client
    container_name: fl-client-1
    profiles: ["training"]
    env_file:
      - .env
    environment:
      CLIENT_ID: client1
      FL_SERVER_ADDRESS: fl-server:8080
      TRAINING_MODE: ${TRAINING_MODE:-mock}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    networks:
      - iot-net
    depends_on:
      - fl-server
    restart: "no"

  fl-client-2:
    build:
      context: ./fl-client
    container_name: fl-client-2
    profiles: ["training"]
    env_file:
      - .env
    environment:
      CLIENT_ID: client2
      FL_SERVER_ADDRESS: fl-server:8080
      TRAINING_MODE: ${TRAINING_MODE:-mock}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    networks:
      - iot-net
    depends_on:
      - fl-server
    restart: "no"

  fl-client-3:
    build:
      context: ./fl-client
    container_name: fl-client-3
    profiles: ["training"]
    env_file:
      - .env
    environment:
      CLIENT_ID: client3
      FL_SERVER_ADDRESS: fl-server:8080
      TRAINING_MODE: ${TRAINING_MODE:-mock}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    networks:
      - iot-net
    depends_on:
      - fl-server
    restart: "no"

  node-red:
    image: nodered/node-red:latest
    container_name: node-red
    profiles: ["orchestration"]
    ports:
      - "1880:1880"
    volumes:
      - node_red_data:/data
      - ./node-red/flows.json:/data/flows.json:ro
    networks:
      - iot-net
    depends_on:
      mosquitto:
        condition: service_healthy
    restart: unless-stopped

  qga-service:
    build:
      context: ./qga-service
    container_name: qga-service
    profiles: ["preprocessing"]
    environment:
      QGA_DEFAULT_ITERATIONS: ${QGA_DEFAULT_ITERATIONS:-20}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    ports:
      - "${QGA_SERVICE_PORT:-8020}:8000"
    networks:
      - iot-net
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # NOTE: iot-node-2 and iot-node-3
  # will be added in future prompts.
  # Future services should reuse the bind mounts documented in
  # x-future-service-mounts above.
