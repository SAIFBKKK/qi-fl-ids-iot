        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  fl-client-1:
    build:
      context: ./fl-client
    container_name: fl-client-1
    profiles: ["training"]
    env_file:
      - .env
    environment:
      CLIENT_ID: client1
      FL_SERVER_ADDRESS: fl-server:8080
      TRAINING_MODE: ${TRAINING_MODE:-mock}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    networks:
