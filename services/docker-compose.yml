        ]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  iot-node-5:
    build:
      context: ./iot-node
    container_name: iot-node-5
    profiles: ["extended"]
    environment:
      NODE_ID: node5
      MQTT_BROKER: mosquitto
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_USERNAME: ${MQTT_USERNAME:-ids_user}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-changeme_in_dotenv}
      INFERENCE_THRESHOLD: ${INFERENCE_THRESHOLD:-0.5}
      MODEL_PATH: /artifacts/global_model.pth
      SCALER_PATH: /artifacts/scaler.pkl
      FEATURE_NAMES_PATH: /artifacts/feature_names.json
      LABEL_MAPPING_PATH: /artifacts/label_mapping.json
      MODEL_CONFIG_PATH: /artifacts/model_config.json
      MODEL_SERVER_URL: http://fl-server:8080
      DEVICE_TYPE: raspberrypi-4
      NETWORK_QUALITY: high
      BATTERY_POWERED: "false"
      MODEL_TIER: powerful
      NODE_TIER_OVERRIDE: powerful
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    ports:
      - "8005:8000"
    volumes:
