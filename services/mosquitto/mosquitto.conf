# Mosquitto 2.0.18 configuration for QI-FL-IDS-IoT
# Demo-grade: username/password authentication.

listener 1883
allow_anonymous false
password_file /mosquitto/config/passwords

# Logs
log_dest stdout
log_type all
connection_messages true

# Persistence: in-memory only for demo.
persistence false

# Limits
max_inflight_messages 200
max_queued_messages 1000
