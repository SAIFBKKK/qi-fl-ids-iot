global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # ── IoT nodes (container port interne 8000) ───────────────────────────────
  - job_name: "iot-node-1"
    static_configs:
      - targets: ["iot-node-1:8000"]
    metrics_path: "/metrics"

  - job_name: "iot-node-2"
    static_configs:
      - targets: ["iot-node-2:8000"]
    metrics_path: "/metrics"

  - job_name: "iot-node-3"
    static_configs:
      - targets: ["iot-node-3:8000"]
    metrics_path: "/metrics"

  # ── Traffic generator ─────────────────────────────────────────────────────
  - job_name: "traffic-generator"
    static_configs:
      - targets: ["traffic-generator:8000"]
    metrics_path: "/metrics"

  # Optional profile targets are intentionally not scraped by default:
  # - edge-ids-gateway:8000  # only when --profile gateway is active

  # ── Feature extractor — only when --profile extraction is active ──────────
  - job_name: "feature-extractor"
    static_configs:
      - targets: ["feature-extractor:8000"]
    metrics_path: "/metrics"

  # ── FL server (profil training uniquement — up=0 quand arrêté) ───────────
  - job_name: "fl-server"
    static_configs:
      - targets: ["fl-server:8000"]
    metrics_path: "/metrics"
